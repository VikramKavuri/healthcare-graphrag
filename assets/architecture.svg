<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" role="img" aria-label="Deployment architecture: the browser loads a static single-page app from the Vercel edge; /api requests hit a FastAPI serverless function that runs the GraphRAG engine and calls Groq, with a deterministic extractive fallback.">
  <defs>
    <linearGradient id="a-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <radialGradient id="a-glow" cx="18%" cy="-10%" r="90%">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <pattern id="a-grid" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#94a3b8" fill-opacity="0.07"/>
    </pattern>
    <filter id="a-soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <marker id="a-arrow" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#3a5170"/>
    </marker>
    <style>
      .box{ fill:#121826; stroke:#26344a; stroke-width:1.4; opacity:0; animation:a-fin .6s ease forwards; }
      @keyframes a-fin{ to{opacity:1;} }
      .ttl{ font-family:ui-sans-serif,system-ui,"Segoe UI",Roboto,sans-serif; fill:#e8eef5; font-weight:700; }
      .lbl{ font-family:ui-sans-serif,system-ui,"Segoe UI",Roboto,sans-serif; fill:#e8eef5; font-weight:600; }
      .sub{ font-family:ui-monospace,Menlo,Consolas,monospace; fill:#8fa1b3; }
      .cap{ font-family:ui-monospace,Menlo,Consolas,monospace; fill:#5b6776; letter-spacing:3px; }
      .chip{ fill:#0e131c; stroke:#2a3854; stroke-width:1; }
      .chiptxt{ font-family:ui-monospace,Menlo,Consolas,monospace; fill:#cbd5e1; }
      .conn{ stroke:#2a3a52; stroke-width:2; fill:none; }
      .dash{ stroke:#5b6776; stroke-width:1.4; stroke-dasharray:4 4; fill:none; }
    </style>
  </defs>

  <rect width="1000" height="380" rx="18" fill="#0b0f16"/>
  <rect width="1000" height="380" rx="18" fill="url(#a-grid)"/>
  <rect width="1000" height="380" rx="18" fill="url(#a-glow)"/>
  <rect x="0.5" y="0.5" width="999" height="379" rx="18" fill="none" stroke="#1c2636"/>

  <text class="ttl" x="40" y="44" font-size="20">Healthcare GraphRAG</text>
  <text class="cap" x="40" y="66" font-size="11">DEPLOYMENT ARCHITECTURE · VERCEL</text>

  <!-- connectors -->
  <line class="conn" x1="175" y1="215" x2="214" y2="215" marker-end="url(#a-arrow)"/>
  <line class="conn" x1="380" y1="215" x2="429" y2="215" marker-end="url(#a-arrow)"/>
  <line class="conn" x1="585" y1="215" x2="609" y2="215" marker-end="url(#a-arrow)"/>
  <line class="conn" x1="825" y1="215" x2="849" y2="215" marker-end="url(#a-arrow)"/>

  <!-- traveling request pulse -->
  <circle r="5" fill="url(#a-accent)" filter="url(#a-soft)">
    <animateMotion dur="3.4s" repeatCount="indefinite" path="M175,215 H853" calcMode="linear"/>
    <animate attributeName="opacity" dur="3.4s" repeatCount="indefinite" values="0;1;1;1;0" keyTimes="0;0.07;0.5;0.9;1"/>
  </circle>

  <!-- 1 Browser -->
  <g><rect class="box" x="25" y="175" width="150" height="80" rx="12" style="animation-delay:.05s"/>
    <text class="lbl" x="100" y="208" font-size="15" text-anchor="middle">Browser</text>
    <text class="sub" x="100" y="230" font-size="10.5" text-anchor="middle">single-page app</text></g>

  <!-- 2 Vercel Edge -->
  <g><rect class="box" x="220" y="165" width="160" height="100" rx="12" style="animation-delay:.18s"/>
    <text class="lbl" x="300" y="190" font-size="14" text-anchor="middle">Vercel Edge</text>
    <rect class="chip" x="230" y="200" width="140" height="24" rx="6"/>
    <text class="chiptxt" x="300" y="216" font-size="10" text-anchor="middle">public/ SPA · CDN</text>
    <rect class="chip" x="230" y="230" width="140" height="24" rx="6"/>
    <text class="chiptxt" x="300" y="246" font-size="10" text-anchor="middle">/api/* → function</text></g>

  <!-- 3 FastAPI function -->
  <g><rect class="box" x="435" y="175" width="150" height="80" rx="12" style="animation-delay:.31s"/>
    <text class="lbl" x="510" y="205" font-size="14" text-anchor="middle">FastAPI</text>
    <text class="sub" x="510" y="228" font-size="10.5" text-anchor="middle">api/index.py (ASGI)</text></g>

  <!-- 4 graphrag engine -->
  <g><rect class="box" x="610" y="130" width="215" height="175" rx="12" style="animation-delay:.44s"/>
    <text class="lbl" x="717" y="153" font-size="13" text-anchor="middle">graphrag engine</text>
    <g font-size="10">
      <rect class="chip" x="622" y="166" width="92" height="26" rx="6"/><text class="chiptxt" x="668" y="183" text-anchor="middle">dataset</text>
      <rect class="chip" x="722" y="166" width="92" height="26" rx="6"/><text class="chiptxt" x="768" y="183" text-anchor="middle">graph</text>
      <rect class="chip" x="622" y="200" width="92" height="26" rx="6"/><text class="chiptxt" x="668" y="217" text-anchor="middle">retrieval</text>
      <rect class="chip" x="722" y="200" width="92" height="26" rx="6"/><text class="chiptxt" x="768" y="217" text-anchor="middle">reasoning</text>
      <rect class="chip" x="622" y="234" width="92" height="26" rx="6"/><text class="chiptxt" x="668" y="251" text-anchor="middle">llm</text>
      <rect class="chip" x="722" y="234" width="92" height="26" rx="6"/><text class="chiptxt" x="768" y="251" text-anchor="middle">viz</text>
    </g>
    <text class="sub" x="717" y="288" font-size="9.5" text-anchor="middle">stdlib · pure-Python TF-IDF · networkx</text></g>

  <!-- 5 Groq -->
  <g><rect class="box" x="850" y="175" width="125" height="80" rx="12" style="animation-delay:.57s"/>
    <text class="lbl" x="912" y="205" font-size="14" text-anchor="middle">Groq</text>
    <text class="sub" x="912" y="228" font-size="9.5" text-anchor="middle">llama-3.3-70b</text></g>

  <!-- extractive fallback -->
  <path class="dash" d="M912,255 V286"/>
  <g><rect class="chip" x="833" y="288" width="158" height="26" rx="7" style="opacity:0;animation:a-fin .6s ease forwards;animation-delay:.7s"/>
    <text class="chiptxt" x="912" y="305" font-size="10" text-anchor="middle">extractive fallback</text></g>

  <text class="sub" x="40" y="345" font-size="11">request ▸ retrieval + graph context ▸ Groq answer (or extractive) ▸ traceability returned to the browser</text>
</svg>
