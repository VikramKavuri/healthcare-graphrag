<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" role="img" aria-label="Lean by design: at build time, Excel tables are converted by prepare_data.py (pandas, openpyxl) into a committed dataset.json. At runtime on Vercel, only the JSON, a pure-Python TF-IDF index, networkx and groq are used — heavy data libraries never ship.">
  <defs>
    <linearGradient id="d-cross" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f0b429"/><stop offset="1" stop-color="#0f9d6b"/>
    </linearGradient>
    <pattern id="d-grid" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#94a3b8" fill-opacity="0.06"/>
    </pattern>
    <marker id="d-arr-a" markerWidth="9" markerHeight="9" refX="5.5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#f0b429"/></marker>
    <marker id="d-arr-t" markerWidth="9" markerHeight="9" refX="5.5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#0f9d6b"/></marker>
    <style>
      .box{ fill:#ffffff; stroke:#d4e0da; stroke-width:1.4; opacity:0; animation:d-fin .55s ease forwards; }
      @keyframes d-fin{ from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:none;} }
      .ttl{ font-family:ui-sans-serif,system-ui,"Segoe UI",Roboto,sans-serif; fill:#13271f; font-weight:700; }
      .lbl{ font-family:ui-sans-serif,system-ui,"Segoe UI",Roboto,sans-serif; fill:#13271f; font-weight:600; }
      .sub{ font-family:ui-monospace,Menlo,Consolas,monospace; fill:#52655c; }
      .cap{ font-family:ui-monospace,Menlo,Consolas,monospace; fill:#7f9088; letter-spacing:3px; }
      .zoneA{ font-family:ui-monospace,Menlo,Consolas,monospace; fill:#f0b429; letter-spacing:2px; }
      .zoneT{ font-family:ui-monospace,Menlo,Consolas,monospace; fill:#0f9d6b; letter-spacing:2px; }
      .flowA{ stroke:#f0b429; stroke-width:2.2; fill:none; stroke-dasharray:6 8; animation:d-march 1.1s linear infinite; opacity:.85; }
      .flowT{ stroke:#0f9d6b; stroke-width:2.2; fill:none; stroke-dasharray:6 8; animation:d-march 1.1s linear infinite; opacity:.85; }
      .cross{ stroke:url(#d-cross); stroke-width:2.6; fill:none; stroke-dasharray:6 8; animation:d-march 1s linear infinite; }
      @keyframes d-march{ to{ stroke-dashoffset:-28; } }
    </style>
  </defs>

  <rect width="1000" height="320" rx="18" fill="#f1f6f3"/>
  <rect x="0" y="0" width="520" height="320" rx="18" fill="#f0b429" fill-opacity="0.04"/>
  <rect x="520" y="0" width="480" height="320" fill="#0f9d6b" fill-opacity="0.05"/>
  <rect width="1000" height="320" rx="18" fill="url(#d-grid)"/>
  <rect x="0.5" y="0.5" width="999" height="319" rx="18" fill="none" stroke="#e2ebe7"/>

  <text class="ttl" x="40" y="42" font-size="19">Lean by design</text>
  <text class="cap" x="40" y="63" font-size="11">BUILD-TIME DATA PREP  vs  RUNTIME</text>

  <!-- boundary -->
  <line x1="520" y1="78" x2="520" y2="250" stroke="#cdded6" stroke-width="1.4" stroke-dasharray="3 5"/>
  <text class="zoneA" x="40" y="98" font-size="11">BUILD TIME · LOCAL</text>
  <text class="zoneT" x="544" y="98" font-size="11">RUNTIME · VERCEL SERVERLESS</text>

  <!-- connectors -->
  <path class="flowA" d="M156,180 H173" marker-end="url(#d-arr-a)"/>
  <path class="flowA" d="M326,180 H368" marker-end="url(#d-arr-a)"/>
  <path class="cross" d="M491,180 H538" marker-end="url(#d-arr-t)"/>
  <path class="flowT" d="M681,180 H708" marker-end="url(#d-arr-t)"/>
  <path class="flowT" d="M867,180 H874" marker-end="url(#d-arr-t)"/>

  <!-- crossing packet -->
  <g>
    <rect x="-26" y="-11" width="52" height="22" rx="6" fill="#f3f8f5" stroke="#0f9d6b" stroke-width="1.2"/>
    <text x="0" y="4" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="9" fill="#26392f">.json</text>
    <animateMotion dur="2.6s" repeatCount="indefinite" path="M468,150 H560" calcMode="linear"/>
    <animate attributeName="opacity" dur="2.6s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.18;0.82;1"/>
  </g>

  <!-- build boxes -->
  <g><rect class="box" x="26" y="148" width="130" height="64" rx="11" style="animation-delay:.05s"/>
    <text class="lbl" x="91" y="176" font-size="13" text-anchor="middle">Excel tables</text>
    <text class="sub" x="91" y="196" font-size="9.5" text-anchor="middle">data/*.xlsx</text></g>
  <g><rect class="box" x="175" y="148" width="151" height="64" rx="11" style="animation-delay:.16s"/>
    <text class="lbl" x="250" y="176" font-size="12.5" text-anchor="middle">prepare_data.py</text>
    <text class="sub" x="250" y="196" font-size="9.5" text-anchor="middle">pandas · openpyxl</text></g>
  <g><rect class="box" x="370" y="148" width="121" height="64" rx="11" style="animation-delay:.27s"/>
    <text class="lbl" x="430" y="176" font-size="12.5" text-anchor="middle">dataset.json</text>
    <text class="sub" x="430" y="196" font-size="9.5" text-anchor="middle">committed</text></g>

  <!-- runtime boxes -->
  <g><rect class="box" x="540" y="148" width="141" height="64" rx="11" style="animation-delay:.4s"/>
    <text class="lbl" x="610" y="176" font-size="12.5" text-anchor="middle">stdlib loader</text>
    <text class="sub" x="610" y="196" font-size="9.5" text-anchor="middle">json only</text></g>
  <g><rect class="box" x="710" y="148" width="157" height="64" rx="11" style="animation-delay:.5s"/>
    <text class="lbl" x="788" y="174" font-size="12.5" text-anchor="middle">engine</text>
    <text class="sub" x="788" y="194" font-size="9" text-anchor="middle">TF-IDF · networkx · groq</text></g>
  <g><rect class="box" x="874" y="148" width="110" height="64" rx="11" style="animation-delay:.6s"/>
    <text class="lbl" x="929" y="176" font-size="12.5" text-anchor="middle">/api JSON</text>
    <text class="sub" x="929" y="196" font-size="9.5" text-anchor="middle">FastAPI</text></g>

  <!-- banner -->
  <g><rect x="40" y="262" width="920" height="34" rx="9" fill="#f3f8f5" stroke="#d4e0da" style="opacity:0;animation:d-fin .6s ease forwards;animation-delay:.72s"/>
    <text x="500" y="284" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11" fill="#52655c">pandas · scikit-learn · numpy stay at build time — the deployed function ships only JSON, a pure-Python index, networkx &amp; groq</text></g>
</svg>
